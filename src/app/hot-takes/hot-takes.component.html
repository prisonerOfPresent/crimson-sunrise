<div class="flex-column marg-5px">
  <h1 class="light-font">My Hot Takes</h1>

  @if (hotTakes && hotTakes.length > 0) {
    <ul>
      @for (take of hotTakes; track take.id) {
        <li class="marg-10px light-font">
          <div class="flex-row items-center">
            <a class="disabled-link light-font">
              {{ take.title }}
            </a>
            @if (loggedIn) {
              <button (click)="deleteHotTake(take.id)" class="marg-10px flex-row items-center">
                <img src="delete-icon.png" class="button-icon marg-5px" alt="Delete icon"/>
                Delete
              </button>
            }
          </div>
          @if (take.details.length > 0) {
            <ul class="marg-10px">
              <li class="light-font">{{ take.details }}</li>
            </ul>
          }
        </li>
      }
    </ul>
  } @else {
    <p class="light-font">Nothing here :(. Come back again later!</p>
  }
</div>
